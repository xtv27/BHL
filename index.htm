<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ВХЛ</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #050505;
    color: white;
}

/* ===== NAV ===== */
.nav {
    position: fixed;
    width: 100%;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;

    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
}

.menu {
    display: none;
    flex-direction: column;
    gap: 10px;
}

.menu a {
    color: #aaa;
    text-decoration: none;
}

.burger {
    font-size: 22px;
    cursor: pointer;
}

/* ===== HERO ===== */
.hero {
    min-height: 100vh;
    padding: 100px 20px 40px;
    text-align: center;
}

.hero h1 {
    font-size: 2rem;
    margin-bottom: 10px;
}

.hero p {
    color: #aaa;
}

.btn {
    margin-top: 20px;
    padding: 12px 20px;
    border-radius: 30px;
    background: red;
    border: none;
    color: white;
    font-size: 16px;
}

/* ===== ШАЙБА ===== */
.puck {
    width: 120px;
    height: 120px;
    margin: 30px auto;
    background: radial-gradient(circle, #333, #000);
    border-radius: 50%;
    box-shadow: 0 0 30px red;
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* ===== РАСПИСАНИЕ ===== */
.schedule {
    padding: 20px;
}

.match {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 12px;
}

.match-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    color: #aaa;
}

.teams {
    font-weight: 600;
    font-size: 1.1rem;
}

.score {
    margin-top: 5px;
    font-size: 1.4rem;
    color: red;
}

/* ===== DESKTOP ===== */
@media(min-width: 700px){
    .hero {
        display: flex;
        align-items: center;
        justify-content: space-between;
        text-align: left;
        padding: 0 80px;
    }

    .puck {
        width: 200px;
        height: 200px;
    }

    .menu {
        display: flex;
        flex-direction: row;
    }

    .burger {
        display: none;
    }

    .schedule {
        padding: 80px;
    }

    .match {
        display: grid;
        grid-template-columns: 1fr 1fr 2fr 2fr 1fr;
        align-items: center;
    }

    .match-top {
        display: contents;
    }
}
</style>
</head>

<body>

<div class="nav">
    <div>🏒 ВХЛ</div>
    <div class="burger" onclick="toggleMenu()">☰</div>

    <div class="menu" id="menu">
        <a href="#">Главная</a>
        <a href="#schedule">Матчи</a>
        <a href="#">Команды</a>
    </div>
</div>

<section class="hero">
    <div>
        <h1>Восточная хоккейная лига</h1>
        <p>Лето 2026 · матчи и эмоции</p>
        <button class="btn" onclick="scrollToSchedule()">Смотреть расписание</button>
    </div>

    <div class="puck"></div>
</section>

<section class="schedule" id="schedule">
<h2 style="margin-bottom:15px;">Расписание</h2>

<div id="matches"></div>
</section>

<script>
const matches = [
["06.06", "-:00", "АМУРИС", "ТАЙФУН", "?"],
["07.06", "-:00", "ТАЙФУН", "АМУРИС", "?"],
["11.06", "-:00", "ТАЙФУН", "ГИМАЛАЙ", "?"],
["13.06", "-:00", "ГИМАЛАЙ", "ТАЙФУН", "?"],
["14.06", "-:00", "ГИМАЛАЙ", "АМУРИС", "?"],
];

const container = document.getElementById("matches");

matches.forEach(m => {
    const div = document.createElement("div");
    div.className = "match";

    div.innerHTML = `
        <div class="match-top">
            <span>${m[0]}</span>
            <span>${m[1]}</span>
        </div>
        <div class="teams">${m[2]} vs ${m[3]}</div>
        <div class="score">${m[4]}</div>
    `;

    container.appendChild(div);
});

function scrollToSchedule(){
    document.getElementById("schedule").scrollIntoView({
        behavior: "smooth"
    });
}

function toggleMenu(){
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}
</script>

</body>
</html>
