<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ВХЛ</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #050505;
    color: white;
}

/* ===== NAV ===== */
.nav {
    position: fixed;
    width: 100%;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;

    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
}

/* ===== HERO ===== */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 80px;
}

.hero h1 {
    font-size: 3.5rem;
    font-weight: 800;
}

.btn {
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 30px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
}

/* ===== ШАЙБА ===== */
.puck {
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, #333, #000);
    border-radius: 50%;
    box-shadow: 0 0 50px red;
    position: relative;
    animation: float 4s ease-in-out infinite;
}

.puck::after {
    content: "";
    position: absolute;
    width: 300px;
    height: 5px;
    background: linear-gradient(90deg, orange, transparent);
    top: 50%;
    left: -300px;
}

/* ===== АНИМАЦИЯ ===== */
@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

/* ===== РАСПИСАНИЕ ===== */
.schedule {
    padding: 80px;
}

.match {
    display: grid;
    grid-template-columns: 1fr 1fr 2fr 2fr 1fr;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    transition: 0.2s;
}

.match:hover {
    background: rgba(255,0,0,0.1);
}

.badge {
    background: rgba(255,0,0,0.2);
    padding: 5px 10px;
    border-radius: 20px;
}
</style>
</head>

<body>

<div class="nav">
    <div>🏒 ВХЛ</div>
    <div>Главная | Матчи | Команды</div>
</div>

<section class="hero">
    <div>
        <h1>Восточная хоккейная лига</h1>
        <p>Лето 2026 · матчи и эмоции</p>
        <button class="btn" onclick="scrollToSchedule()">Смотреть расписание</button>
    </div>

    <div class="puck"></div>
</section>

<section class="schedule" id="schedule">

<h2 style="margin-bottom:20px;">РАСПИСАНИЕ</h2>

<div id="matches"></div>

</section>

<script>
const matches = [
["06.06", "-:00", "АМУРИС", "ТАЙФУН", "?"],
["07.06", "-:00", "ТАЙФУН", "АМУРИС", "?"],
["11.06", "-:00", "ТАЙФУН", "ГИМАЛАЙ", "?"],
["13.06", "-:00", "ГИМАЛАЙ", "ТАЙФУН", "?"],
["14.06", "-:00", "ГИМАЛАЙ", "АМУРИС", "?"],
];

const container = document.getElementById("matches");

matches.forEach(m => {
    const div = document.createElement("div");
    div.className = "match";

    div.innerHTML = `
        <div>${m[0]}</div>
        <div class="badge">${m[1]}</div>
        <div>${m[2]}</div>
        <div>${m[3]}</div>
        <div>${m[4]}</div>
    `;

    container.appendChild(div);
});

function scrollToSchedule(){
    document.getElementById("schedule").scrollIntoView({
        behavior: "smooth"
    });
}
</script>

</body>
</html>
